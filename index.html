<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho Books — Expense Ledger</title>
    <meta name="description" content="Expense tracking interface for Zoho Books with AI assistant.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
    <div class="nav-inner">
        <a href="#" class="nav-logo">
            <div class="nav-logo-icon">ZB</div>
            Zoho Books
        </a>
        <div class="nav-right">
            <a href="dashboard.html" class="btn btn-outline btn-sm">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                Dashboard
            </a>
            <a href="expenses.html" class="btn btn-outline btn-sm">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                View Expenses
            </a>
            <button class="btn btn-outline btn-sm" onclick="toggleChat()">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                Assistant
            </button>
        </div>
    </div>
</nav>

<!-- MAIN -->
<main class="main-content">
    <div class="page-header">
        <h1 class="page-title">Record Expenses</h1>
        <p class="page-desc">Log expenses and sync them to your Zoho Books ledger.</p>
    </div>

    <div class="form-wrapper">
        <form id="bulkExpenseForm">
            <div id="expenseContainer"></div>
            <div class="form-total-bar">
                <span class="form-total-label">Total</span>
                <span class="form-total-value" id="runningTotal">₹0.00</span>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-outline btn-sm" id="addRowBtn">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    Add Entry
                </button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                    Sync to Zoho Books
                </button>
            </div>
            <div id="statusMessage" class="message"></div>
        </form>
    </div>
</main>

<footer class="footer">
    &copy; 2026 Expense Ledger &mdash; Synced with Zoho Books via n8n
</footer>

<!-- CHAT TOGGLE -->
<button class="chat-toggle" id="chatToggle" onclick="toggleChat()" aria-label="Open AI Assistant">
    <svg id="chatIconOpen" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <svg id="chatIconClose" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
</button>

<!-- CHAT PANEL -->
<div class="chat-panel" id="chatPanel">
    <div class="chat-header">
        <div class="chat-header-avatar">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <div>
            <div class="chat-header-title">Financial Assistant</div>
            <div class="chat-header-status">Online</div>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-msg bot">Hello! I'm your Zoho Books assistant. How can I help you today?</div>
    </div>
    <div class="chat-error" id="chatError"></div>
    <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
        <button class="chat-send" id="chatSend" onclick="sendChatMessage()" aria-label="Send">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<!-- JS: config first, then categories, app, chat -->
<script src="config.js"></script>
<script src="categories.js"></script>
<script src="app.js"></script>
<script src="chat.js"></script>

</body>
</html>
